<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity Interests Form</title>
    <link rel="stylesheet" href="suggestions.css" />
  </head>
  <body>
    <h1>
      Please Fill Out The Following Form and Press Submit Once You've Finished
    </h1>
    <form action="https://formsubmit.co/349227785@gapps.yrdsb.ca" method="POST">
      <input type="hidden" name="_subject" value="Club Suggestions" />
      <input
        type="text"
        placeholder="Please Enter Your Full Name"
        name="Name"
        class="input-field"
        required
      />
      <input
        type="email"
        placeholder="Please Enter Your @gapps email address"
        name="Email"
        class="input-field"
        required
      />
      <input
        type="text"
        placeholder="Please Enter Your Position In the Club (General Member, Junior Associate, Senior Associate, Junior Partner, Senior Partner, etc.)"
        name="Position"
        class="input-field"
        required
      />
      <input
        type="text"
        placeholder="Please Enter Any Suggestions You Have For the Club (Activites you'd like to do, your interests, etc)"
        name="Suggestions"
        class="input-field"
        required
      />
      <input
        type="text"
        placeholder="Anything Else You'd Like To Share With Us?"
        name="Anyting Else"
        class="input-field"
        required
      />
      <input type="hidden" name="_next" value="https://ecsscomputerscience.github.io/Club/suggestions.html">
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
